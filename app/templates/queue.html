<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline — {{ queue.name }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/i18n.js"></script>
</head>
<body>
    <div class="page">
        <div class="top-bar">
            <a href="/" class="back-link" data-i18n="backHome"></a>
            <div id="langToggle"></div>
        </div>
        <div class="card">
            <div class="queue-header">
                <h1 id="qName">{{ queue.name }}</h1>
                <span class="status-badge" id="qStatus">{{ queue.status.value }}</span>
            </div>

            <div id="infoBlock" class="info-block" style="display:none;"></div>

            <div class="my-position-box" id="myPositionBox" style="display:none;">
                <div class="position-number" id="myPosition">-</div>
                <div class="position-label" id="myPositionLabel" data-i18n="positionLabel"></div>
                <div class="position-slot" id="mySlot"></div>
            </div>

            <div class="my-status-box" id="myStatusBox" style="display:none;">
                <span class="status-tag" id="myStatus">-</span>
            </div>

            <div class="queue-actions" id="queueActions" style="display:none;">
                <button class="btn btn-outline-warning btn-sm" onclick="markDelayed()" data-i18n="delayedBtn">&#9200; </button>
                <button class="btn btn-secondary btn-sm" onclick="leaveQueue()" data-i18n="leaveQueue">&#10005; </button>
            </div>

            <div id="mySwapNotification" class="swap-notification" style="display:none;"></div>

            <div id="incomingSwapsWrap" style="display:none;">
                <div class="incoming-swaps" id="incomingSwaps"></div>
            </div>

            <div id="calledBanner" class="called-banner" style="display:none;">
                <span class="called-banner-icon">&#9202;</span>
                <span class="called-banner-text" data-i18n="itsYourTurn"></span>
            </div>

            <div id="swapWrap" style="display:none;">
            <details class="swap-details" open>
                <summary class="swap-summary" data-i18n="swapRequests"></summary>
                <div class="swap-details-body">
                    <p class="hint" style="margin-bottom:12px;" data-i18n="swapHint"></p>
                    <div class="swap-type-tabs">
                        <button class="swap-tab active" onclick="setSwapType('slot_change',this)" data-i18n="swapSlot"></button>
                        <button class="swap-tab" id="posTab" onclick="setSwapType('position_change',this)" data-i18n="swapPosition"></button>
                    </div>
                    <div id="swapSlotPanel">
                        <label class="form-label" data-i18n="selectSwapUser"></label>
                        <select id="swapTargetUser" class="input"></select>
                        <button class="btn btn-secondary btn-sm" onclick="requestSwap()" style="margin-top:10px;" data-i18n="sendRequest"></button>
                    </div>
                    <div id="swapPositionPanel" style="display:none;">
                        <label class="form-label" data-i18n="selectPosUser"></label>
                        <select id="swapTargetUserPos" class="input"></select>
                        <button class="btn btn-secondary btn-sm" onclick="requestPositionSwap()" style="margin-top:10px;" data-i18n="sendRequest"></button>
                    </div>
                </div>
            </details>
            </div>

            <div class="slots-section">
                <h3 data-i18n="schedule"></h3>
                <div class="slots-list" id="slotsList"><div class="loading" data-i18n="loading"></div></div>
            </div>
        </div>
    </div>

    <script>
    const queueId = '{{ queue.id }}';
    const userToken = localStorage.getItem('user_token_' + queueId);
    let currentSwapType = 'slot_change';
    let cachedData = null;

    document.getElementById('langToggle').innerHTML = langToggleHTML();
    translatePage();

    function setSwapType(type, btn) {
        currentSwapType = type;
        document.querySelectorAll('.swap-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('swapSlotPanel').style.display = type === 'slot_change' ? 'block' : 'none';
        document.getElementById('swapPositionPanel').style.display = type === 'position_change' ? 'block' : 'none';
    }

    async function loadQueue() {
        const res = await fetch('/api/queue/' + queueId);
        const data = await res.json();
        cachedData = data;
        document.getElementById('qName').textContent = data.name;
        document.getElementById('qStatus').textContent = data.status;
        document.getElementById('qStatus').className = 'status-badge status-' + data.status;

        if (data.info) {
            document.getElementById('infoBlock').style.display = 'block';
            document.getElementById('infoBlock').textContent = data.info;
        } else {
            document.getElementById('infoBlock').style.display = 'none';
        }

        const myToken = userToken;
        const me = myToken ? data.participants.find(p => p.user_token === myToken) : null;

        const useSlotsForView = data.use_time_slots;
        let html = '';
        let lastSlotGroup = null;

        for (const p of data.participants) {
            if (!['waiting','called','delayed','served','skipped'].includes(p.status)) continue;
            const isDone = ['served','skipped'].includes(p.status);
            const isCalled = p.status === 'called';
            const isDelayed = p.status === 'delayed';
            const isMe = myToken && p.user_token === myToken;

            if (useSlotsForView && !isDone && p.slot_group !== null && p.slot_group !== lastSlotGroup) {
                lastSlotGroup = p.slot_group;
                if (p.slot_label) {
                    html += '<div class="slot-group-header" style="margin:12px 0 6px;padding:0;"><span class="slot-group-time">' + esc(p.slot_label) + '</span></div>';
                }
            } else if (!useSlotsForView || isDone) {
                lastSlotGroup = null;
            }

            let slotInSlot = '';
            if (!isDone && useSlotsForView && p.slot_group !== null) {
                const slotPeople = data.participants.filter(x => ['waiting','called','delayed'].includes(x.status) && x.slot_group === p.slot_group).sort((a,b)=>a.position-b.position);
                if (slotPeople.length > 1) {
                    const idx = slotPeople.findIndex(x => x.id === p.id);
                    slotInSlot = '#' + (idx + 1) + ' ' + t('inSlot');
                }
            }

            let cls = 'slot';
            if (isMe) cls += ' slot-me';
            if (isDone) cls += ' slot-done';
            if (isCalled && isMe) cls += ' slot-called';

            html += '<div class="'+cls+'">';
            html += '<div class="slot-left">';
            html += '<span class="slot-pos">'+p.position+'</span>';
            html += '<span class="slot-name">'+esc(p.name)+(isMe?' <span class="you-badge">'+('you' in I18N[getLang()] ? 'you' : '\u044b\u0443')+'</span>':'')+'</span>';
            if (slotInSlot) html += '<span class="slot-in-slot">'+slotInSlot+'</span>';
            if (isCalled) html += '<span class="status-pill called-pill">'+t('called')+'</span>';
            else if (isDelayed) html += '<span class="status-pill delayed-pill">'+t('delayed')+'</span>';
            else if (p.status==='served') html += '<span class="status-pill served-pill">'+t('servedStatus')+'</span>';
            else if (p.status==='skipped') html += '<span class="status-pill skipped-pill">'+t('skipped')+'</span>';
            html += '</div>';
            html += '<div class="slot-right">';
            if (useSlotsForView && p.slot_label) html += '<span class="slot-time-badge">'+esc(p.slot_label)+'</span>';
            html += '</div></div>';
        }
        if (!html) html = '<div class="empty">'+t('emptyList')+'</div>';
        document.getElementById('slotsList').innerHTML = html;

        updateMyInfo(data);
        updateSwapSection(data);
        checkSwapNotifications(data);
        checkIncomingSwaps(data);
    }

    function updateMyInfo(data) {
        if (!userToken) return;
        const me = data.participants.find(p => p.user_token === userToken);
        if (!me) return;
        document.getElementById('myPositionBox').style.display = 'block';
        document.getElementById('myStatusBox').style.display = 'block';
        document.getElementById('myPosition').textContent = '#' + me.position;

        const slotBox = document.getElementById('mySlot');
        const posLabel = document.getElementById('myPositionLabel');
        if (me.status === 'called') {
            slotBox.textContent = t('itsYourTurn'); slotBox.className = 'position-slot slot-now-text';
            posLabel.textContent = t('youCalled');
        } else if (me.status === 'served') {
            slotBox.textContent = t('youServed'); slotBox.className = 'position-slot slot-served-text';
            posLabel.textContent = t('statusWaiting');
        } else if (me.slot_label && data.use_time_slots) {
            slotBox.textContent = me.slot_label; slotBox.className = 'position-slot';
            const slotPeople = data.participants.filter(p => ['waiting','called','delayed'].includes(p.status) && p.slot_group === me.slot_group).sort((a,b)=>a.position-b.position);
            if (slotPeople.length > 1) {
                const myIdx = slotPeople.findIndex(p => p.user_token === userToken);
                posLabel.textContent = t('positionInSlot') + ' ' + (myIdx + 1) + ' / ' + slotPeople.length;
            } else {
                posLabel.textContent = t('yourSlot');
            }
        }

        const statusTag = document.getElementById('myStatus');
        const map = {waiting:{t:t('statusWaiting'),c:''},called:{t:t('called'),c:'tag-blue'},delayed:{t:t('delayed'),c:'tag-yellow'},served:{t:t('servedStatus'),c:'tag-green'},skipped:{t:t('skipped'),c:'tag-gray'}};
        const s = map[me.status]||map.waiting;
        statusTag.textContent = s.t; statusTag.className = 'status-tag '+s.c;

        const canDelay = data.allow_delay && (me.status==='waiting'||me.status==='called') && me.status!=='delayed';
        document.getElementById('queueActions').style.display = canDelay ? 'flex' : 'none';

        const banner = document.getElementById('calledBanner');
        banner.style.display = me.status === 'called' ? 'flex' : 'none';
    }

    function updateSwapSection(data) {
        if (!userToken || !data.allow_swap) { document.getElementById('swapWrap').style.display='none'; return; }
        const me = data.participants.find(p => p.user_token === userToken);
        if (!me || (me.status !== 'waiting' && me.status !== 'delayed')) { document.getElementById('swapWrap').style.display='none'; return; }

        const active = data.participants.filter(p => (p.status === 'waiting' || p.status === 'delayed') && p.id !== me.id);

        let otherSlotUsers, sameSlotUsers;
        if (data.use_time_slots) {
            otherSlotUsers = active.filter(p => p.slot_group !== me.slot_group);
            sameSlotUsers = active.filter(p => p.slot_group === me.slot_group);
        } else {
            otherSlotUsers = active;
            sameSlotUsers = [];
        }

        const maxPer = data.max_per_slot || 1;
        document.getElementById('posTab').style.display = (maxPer > 1 && sameSlotUsers.length > 0) ? '' : 'none';
        if (currentSwapType === 'position_change' && (maxPer <= 1 || sameSlotUsers.length === 0)) {
            setSwapType('slot_change', document.querySelector('.swap-tab'));
        }

        const hasSwapOptions = otherSlotUsers.length > 0 || (maxPer > 1 && sameSlotUsers.length > 0);
        if (!hasSwapOptions) { document.getElementById('swapWrap').style.display='none'; return; }
        document.getElementById('swapWrap').style.display = 'block';

        const sel = document.getElementById('swapTargetUser');
        sel.innerHTML = '';
        if (otherSlotUsers.length === 0) {
            sel.innerHTML = '<option value="">' + t('noParticipants') + '</option>';
        } else {
            for (const p of otherSlotUsers) {
                const slotLabel = (data.use_time_slots && p.slot_label) ? ' — ' + esc(p.slot_label) : '';
                sel.innerHTML += '<option value="'+p.id+'">'+esc(p.name)+slotLabel+'</option>';
            }
        }

        const selPos = document.getElementById('swapTargetUserPos');
        selPos.innerHTML = '';
        if (sameSlotUsers.length === 0) {
            selPos.innerHTML = '<option value="">' + t('noSlotParticipants2') + '</option>';
        } else {
            for (const p of sameSlotUsers) {
                selPos.innerHTML += '<option value="'+p.id+'">'+esc(p.name)+' (#'+p.position+')</option>';
            }
        }
    }

    function checkSwapNotifications(data) {
        if (!userToken) return;
        const el = document.getElementById('mySwapNotification');
        const me = data.participants.find(p => p.user_token === userToken);
        if (!me) { el.style.display='none'; return; }
        const mySwap = (data.pending_swaps||[]).find(s => s.from_id === me.id);
        if (mySwap) {
            let desc = t('yourRequest') + ' ';
            const targetName = mySwap.to_name || '?';
            if (mySwap.swap_type === 'slot_change') {
                desc += targetName + ' (' + t('swapSlot') + ')';
            } else {
                desc += targetName + ' (' + t('swapPosition') + ')';
            }
            el.innerHTML = '<span class="swap-notif-text">'+esc(desc)+'</span><button class="btn btn-danger btn-xs" onclick="cancelSwap(\''+mySwap.id+'\')">'+t('cancel')+'</button>';
            el.style.display = 'flex';
        } else {
            el.style.display = 'none';
        }
    }

    function checkIncomingSwaps(data) {
        if (!userToken) return;
        const wrap = document.getElementById('incomingSwapsWrap');
        const el = document.getElementById('incomingSwaps');
        const me = data.participants.find(p => p.user_token === userToken);
        if (!me) { wrap.style.display='none'; return; }
        const incoming = (data.pending_swaps||[]).filter(s => s.to_id === me.id);
        if (incoming.length === 0) { wrap.style.display='none'; return; }
        wrap.style.display='block';
        let h = '';
        for (const s of incoming) {
            const fromName = esc(s.from_name);
            let desc = t('incomingSwap') + ': ' + fromName;
            if (s.swap_type === 'slot_change') desc += ' (' + t('swapSlot') + ')';
            else desc += ' (' + t('swapPosition') + ')';
            h += '<div class="swap-card"><span class="swap-text">'+esc(desc)+'</span>';
            h += '<button class="btn btn-primary btn-xs" onclick="acceptSwap(\''+s.id+'\')">'+t('accept')+'</button>';
            h += '<button class="btn btn-danger btn-xs" onclick="rejectSwap(\''+s.id+'\')">'+t('reject')+'</button></div>';
        }
        el.innerHTML = h;
    }

    async function acceptSwap(swapId) {
        const fd = new FormData(); fd.append('user_token', userToken);
        const r = await fetch('/api/queue/'+queueId+'/swap/accept/'+swapId, {method:'POST', body:fd});
        if (r.ok) { alert(t('swapDone')); }
        else { const e = await r.json(); alert(e.detail||t('error')); }
        loadQueue();
    }

    async function rejectSwap(swapId) {
        const fd = new FormData(); fd.append('user_token', userToken);
        await fetch('/api/queue/'+queueId+'/swap/reject/'+swapId, {method:'POST', body:fd});
        loadQueue();
    }

    async function markDelayed() {
        const me = cachedData.participants.find(p => p.user_token === userToken);
        if (!me) return;
        const fd = new FormData(); fd.append('user_token', userToken);
        await fetch('/api/queue/'+queueId+'/delay/'+me.id, {method:'POST', body:fd});
        loadQueue();
    }

    async function requestSwap() {
        const toId = document.getElementById('swapTargetUser').value;
        if (!toId) return;
        const me = cachedData.participants.find(p => p.user_token === userToken);
        if (!me) return;
        const fd = new FormData();
        fd.append('from_id', me.id);
        fd.append('from_token', userToken);
        fd.append('to_id', toId);
        fd.append('swap_type', 'slot_change');
        const r = await fetch('/api/queue/'+queueId+'/swap/request', {method:'POST', body:fd});
        if (r.ok) { const res = await r.json(); if (res.status === 'auto_accepted') alert(t('swapDone')); loadQueue(); }
        else { const e = await r.json(); alert(e.detail||t('error')); }
    }

    async function requestPositionSwap() {
        const toId = document.getElementById('swapTargetUserPos').value;
        if (!toId) return;
        const me = cachedData.participants.find(p => p.user_token === userToken);
        if (!me) return;
        const fd = new FormData();
        fd.append('from_id', me.id);
        fd.append('from_token', userToken);
        fd.append('to_id', toId);
        fd.append('swap_type', 'position_change');
        const r = await fetch('/api/queue/'+queueId+'/swap/request', {method:'POST', body:fd});
        if (r.ok) { const res = await r.json(); if (res.status === 'auto_accepted') alert(t('swapDone')); loadQueue(); }
        else { const e = await r.json(); alert(e.detail||t('error')); }
    }

    async function cancelSwap(swapId) {
        const fd = new FormData(); fd.append('user_token', userToken);
        await fetch('/api/queue/'+queueId+'/swap/cancel/'+swapId, {method:'POST', body:fd});
        loadQueue();
    }

    async function leaveQueue() {
        if (!confirm(t('confirmLeave'))) return;
        try {
            const fd = new FormData();
            fd.append('user_token', userToken);
            await fetch('/api/queue/' + queueId + '/leave', { method: 'POST', body: fd });
        } catch(e) {}
        localStorage.removeItem('user_token_' + queueId);
        localStorage.removeItem('name_' + queueId);
        localStorage.setItem('_deleted_' + queueId, '1');
        window.location.href = '/';
    }

    function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
    loadQueue();
    setInterval(loadQueue, 3000);
    </script>
</body>
</html>
