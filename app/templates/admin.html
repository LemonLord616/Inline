<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline — {{ queue.name }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/i18n.js"></script>
</head>
<body>
    <div class="page">
        <div class="top-bar">
            <a href="/" class="back-link" data-i18n="back"></a>
            <div id="langToggle"></div>
        </div>
        <div class="card">
            <div class="queue-header">
                <h1>{{ queue.name }}</h1>
                <span class="status-badge status-{{ queue.status.value }}" id="qStatus">{{ queue.status.value }}</span>
            </div>

            <div class="share-panel">
                <div class="share-row">
                    <div class="share-qr"><img src="/api/queue/{{ queue.id }}/qr" alt="QR" style="width:94px;height:94px;display:block;"></div>
                    <div class="share-info">
                        <div class="code-display">
                            <span class="code-label" data-i18n="queueCode"></span>
                            <span class="code-value" id="codeValue" onclick="copyText('{{ queue.code }}')">{{ queue.code }}</span>
                            <span class="copy-hint" id="codeHint" data-i18n="clickToCopy"></span>
                        </div>
                        <div class="share-link-row">
                            <input type="text" class="input input-sm" value="{{ share_url }}" readonly id="shareLink">
                            <button class="btn btn-secondary btn-sm" onclick="copyText(document.getElementById('shareLink').value)" data-i18n="copy"></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="admin-controls">
                <div class="control-buttons">
                    {% if queue.status.value == 'active' %}
                    <button class="btn btn-warning btn-sm" onclick="pauseQueue()" data-i18n="pause"></button>
                    {% elif queue.status.value == 'paused' %}
                    <button class="btn btn-primary btn-sm" onclick="resumeQueue()" data-i18n="resume"></button>
                    {% else %}
                    <button class="btn btn-primary btn-sm" onclick="reopenQueue()" data-i18n="reopen"></button>
                    {% endif %}
                    {% if queue.status.value != 'closed' %}
                    <button class="btn btn-danger btn-sm" onclick="closeQueue()" data-i18n="close"></button>
                    {% endif %}
                    <button class="btn btn-primary btn-sm" onclick="callNext()" data-i18n="callNext"></button>
                    <button class="btn btn-secondary btn-sm" onclick="exportExcel()" data-i18n="exportXlsx"></button>
                    <button class="btn btn-danger btn-sm" onclick="deleteQueue()" data-i18n="deleteQueue"></button>
                </div>
            </div>

            <div class="admin-settings">
                <details>
                    <summary class="settings-toggle" data-i18n="settings"></summary>
                    <form id="settingsForm" class="form compact">
                        <div class="form-group"><label class="checkbox-label"><input type="checkbox" name="use_time_slots" {{ 'checked' if queue.use_time_slots is none or queue.use_time_slots else '' }} id="useTimeSlots" onchange="toggleTimeSlotsSettings()"><input type="hidden" name="use_time_slots" id="useTimeSlotsValue" value="{{ 'true' if queue.use_time_slots is none or queue.use_time_slots else 'false' }}"><span data-i18n="useTimeSlots"></span></label></div>
                        <div id="slotSettingsBlock" style="{{ '' if queue.use_time_slots is none or queue.use_time_slots else 'display:none' }}">
                        <div class="form-row">
                            <div class="form-group flex-1"><label data-i18n="startTime"></label><input type="time" name="start_time" class="input" value="{{ queue.start_time or '09:00' }}"></div>
                            <div class="form-group flex-1"><label data-i18n="slotDuration"></label><input type="number" name="slot_duration_minutes" class="input" value="{{ queue.slot_duration_minutes or 30 }}" min="1" max="480"></div>
                        </div>
                        <div class="form-group"><label data-i18n="perSlot"></label><input type="number" name="max_per_slot" class="input" value="{{ queue.max_per_slot or 1 }}" min="1" max="100"></div>
                        </div>
                        <div class="form-group"><label data-i18n="maxPeople"></label><input type="number" name="max_size" class="input" value="{{ queue.max_size }}" min="2" max="500"></div>
                        <div class="form-group"><label data-i18n="participantInfo"></label><textarea name="info" class="input textarea" placeholder="Аудитория, что взять и т.д.">{{ queue.info or '' }}</textarea></div>
                        <div class="form-group"><label class="checkbox-label"><input type="checkbox" name="allow_swap" {{ 'checked' if queue.allow_swap else '' }}><span data-i18n="allowSwap"></span></label></div>
                        <div class="form-group"><label class="checkbox-label"><input type="checkbox" name="allow_delay" {{ 'checked' if queue.allow_delay else '' }}><span data-i18n="allowDelay"></span></label></div>
                        <div class="form-row">
                            <div class="form-group flex-1"><label data-i18n="windowLabel"></label><input type="number" name="safe_window_minutes" class="input" value="{{ queue.safe_window_minutes }}" min="0" max="60"></div>
                            <div class="form-group flex-1"><label data-i18n="latePolicy"></label>
                                <div class="radio-group">
                                    <label class="radio-label"><input type="radio" name="latecomer_policy" value="to_end" {{ 'checked' if queue.latecomer_policy.value=='to_end' else '' }}><span data-i18n="toEnd"></span></label>
                                    <label class="radio-label"><input type="radio" name="latecomer_policy" value="discard" {{ 'checked' if queue.latecomer_policy.value=='discard' else '' }}><span data-i18n="discard"></span></label>
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-secondary btn-sm" data-i18n="save"></button>
                    </form>
                </details>
            </div>

            <div class="slots-section">
                <div class="slots-header">
                    <h3 data-i18n="slots"></h3>
                    <span class="slot-count" id="slotCount"></span>
                </div>
                <div class="slot-overview" id="slotOverview"></div>

                <div class="bulk-toolbar" id="bulkToolbar" style="display:none;">
                    <span class="bulk-selected" id="bulkSelected"></span>
                    <div class="bulk-actions">
                        <select id="bulkTargetSlot" class="input input-sm bulk-select"></select>
                        <button class="btn btn-primary btn-sm" onclick="bulkMove()" data-i18n="move"></button>
                        <button class="btn btn-secondary btn-xs" onclick="clearSelection()" data-i18n="deselect"></button>
                    </div>
                </div>

                <div class="slots-list" id="participantsList"><div class="loading" data-i18n="loading"></div></div>
            </div>

            <div class="undo-bar" id="undoBar" style="display:none;">
                <span id="undoText"></span>
                <button class="btn btn-secondary btn-sm" onclick="undoLast()" data-i18n="undo"></button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
    const queueId = '{{ queue.id }}';
    const token = '{{ token }}';
    const apiUrl = '/api/queue/' + queueId + '/admin/' + token;
    let lastAction = null;
    let selectedIds = new Set();
    let cachedData = null;
    let activeSlotFilter = null;
    let prevSnapshot = null;

    document.getElementById('langToggle').innerHTML = langToggleHTML();
    translatePage();

    localStorage.setItem('admin_' + queueId, JSON.stringify({id: queueId, token, name: '{{ queue.name }}'}));

    function toggleTimeSlotsSettings() {
        const checked = document.getElementById('useTimeSlots').checked;
        document.getElementById('useTimeSlotsValue').value = checked ? 'true' : 'false';
        document.getElementById('slotSettingsBlock').style.display = checked ? '' : 'none';
    }

    async function loadQueue() {
        const res = await fetch('/api/queue/' + queueId);
        const data = await res.json();

        if (prevSnapshot) detectChanges(prevSnapshot, data);
        snapshotCurrent(data);

        cachedData = data;
        document.getElementById('qStatus').textContent = data.status;
        document.getElementById('qStatus').className = 'status-badge status-' + data.status;

        const useSlots = data.use_time_slots;
        const slotsSection = document.querySelector('.slots-section');
        const bulkToolbar = document.getElementById('bulkToolbar');

        if (!useSlots) {
            if (slotsSection) slotsSection.querySelector('.slots-header').style.display = 'none';
            if (slotsSection) document.getElementById('slotOverview').style.display = 'none';
            if (bulkToolbar) bulkToolbar.style.display = 'none';
            activeSlotFilter = null;
        } else {
            if (slotsSection) slotsSection.querySelector('.slots-header').style.display = '';
            if (slotsSection) document.getElementById('slotOverview').style.display = '';
        }

        const waiting = data.participants.filter(p => ['waiting','called','delayed'].includes(p.status));
        document.getElementById('slotCount').textContent = waiting.length + ' ' + t('inQueue');

        if (useSlots) renderSlotOverview(data);
        renderParticipants(data);
    }

    function snapshotCurrent(data) {
        prevSnapshot = {
            ids: new Set(data.participants.map(p => p.id)),
            statuses: Object.fromEntries(data.participants.map(p => [p.id, p.status])),
        };
    }

    function detectChanges(prev, data) {
        for (const p of data.participants) {
            if (!prev.ids.has(p.id) && ['waiting','called','delayed'].includes(p.status)) {
                showToast(t('newParticipant') + ' ' + p.name, 'info');
            }
            const oldStatus = prev.statuses[p.id];
            if (oldStatus && oldStatus !== p.status && p.status === 'delayed') {
                showToast(p.name + t('personDelayed'), 'warning');
            }
        }
    }

    function showToast(text, type) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast toast-' + (type || 'info');
        toast.textContent = text;
        container.appendChild(toast);
        requestAnimationFrame(() => toast.classList.add('toast-show'));
        setTimeout(() => {
            toast.classList.remove('toast-show');
            setTimeout(() => toast.remove(), 300);
        }, 4000);
    }

    function renderSlotOverview(data) {
        const el = document.getElementById('slotOverview');
        const slots = data.slots || [];
        if (slots.length === 0) { el.innerHTML = ''; return; }
        const maxPer = data.max_per_slot || 1;
        const simple = maxPer === 1;

        const totalActive = data.participants.filter(p=>['waiting','called','delayed'].includes(p.status)).length;
        let html = '<button class="slot-card '+(activeSlotFilter===null?'slot-card-active':'')+'" onclick="filterSlot(null)">';
        html += '<span class="slot-card-time">'+t('allParticipants')+'</span>';
        html += '<span class="slot-card-count">'+totalActive+'</span>';
        html += '</button>';

        for (const s of slots) {
            const full = s.count >= s.max;
            const cls = activeSlotFilter === s.index ? 'slot-card-active' : (full ? 'slot-card-full' : '');
            html += '<button class="slot-card '+cls+'" onclick="filterSlot('+s.index+')">';
            html += '<span class="slot-card-time">'+esc(s.label)+'</span>';
            if (simple) {
                html += '<span class="slot-card-dot '+(s.count>0?'dot-filled':'')+'"></span>';
            } else {
                const pct = s.max > 0 ? Math.round((s.count / s.max) * 100) : 0;
                html += '<span class="slot-card-count">'+s.count+' / '+s.max+'</span>';
                html += '<div class="slot-card-bar"><div class="slot-card-fill" style="width:'+pct+'%"></div></div>';
            }
            html += '</button>';
        }
        html += '<button class="slot-card slot-card-add" onclick="addSlot()">+</button>';
        el.innerHTML = html;
    }

    function renderParticipants(data) {
        let html = '';
        const useSlots = data.use_time_slots;
        const active = data.participants.filter(p => ['waiting','called','delayed'].includes(p.status));
        const done = data.participants.filter(p => ['served','skipped'].includes(p.status));

        const filtered = (useSlots && activeSlotFilter !== null)
            ? active.filter(p => p.slot_group === activeSlotFilter)
            : active;

        if (filtered.length > 0) {
            html += '<div class="slot-group">';
            if (useSlots && activeSlotFilter !== null) {
                const s = (data.slots || [])[activeSlotFilter];
                html += '<div class="slot-group-header"><span class="slot-group-time">'+(s ? s.label : 'Slot '+(activeSlotFilter+1))+'</span>';
                html += '<span class="slot-group-count">'+filtered.length+'</span></div>';
            }
            const allIds = filtered.map(p => p.id);
            const allSelected = allIds.length > 0 && allIds.every(id => selectedIds.has(id));

            if (useSlots) {
                html += '<div class="slot-group-header"><label class="check-label"><input type="checkbox" '+(allSelected?'checked':'')+' onchange="toggleGroup(this,['+allIds.map(id=>"'"+id+"'").join(',')+'])"></label><span class="slot-group-time">'+t('allParticipants')+'</span><span class="slot-group-count">'+filtered.length+'</span></div>';
            }

            for (const p of filtered) {
                html += renderRow(p, false, data);
            }
            html += '</div>';
        } else if (useSlots && activeSlotFilter !== null) {
            html += '<div class="empty">'+t('noSlotParticipants')+'</div>';
        }

        if (done.length > 0 && (!useSlots || activeSlotFilter === null)) {
            html += '<div class="slot-group done-group"><div class="slot-group-header"><span class="slot-group-time">'+t('served')+'</span><span class="slot-group-count">'+done.length+'</span></div>';
            for (const p of done) html += renderRow(p, true, data);
            html += '</div>';
        }

        if (!html && activeSlotFilter === null) html = '<div class="empty">'+t('emptyQueue')+'</div>';
        document.getElementById('participantsList').innerHTML = html;
    }

    function renderRow(p, isDone, data) {
        const isCalled = p.status === 'called';
        const isDelayed = p.status === 'delayed';
        const checked = selectedIds.has(p.id) ? 'checked' : '';
        const useSlots = data.use_time_slots;

        let cls = 'slot';
        if (isDone) cls += ' slot-done';
        if (isCalled) cls += ' slot-called';

        let html = '<div class="'+cls+'" data-id="'+p.id+'">';
        html += '<div class="slot-left">';
        if (!isDone) html += '<label class="check-label"><input type="checkbox" '+checked+' onchange="toggleSelect(\''+p.id+'\')"></label>';
        html += '<span class="slot-pos">'+p.position+'</span>';
        html += '<span class="slot-name">'+esc(p.name)+'</span>';
        if (isCalled) html += '<span class="status-pill called-pill" data-i18n="called"></span>';
        else if (isDelayed) html += '<span class="status-pill delayed-pill" data-i18n="delayed"></span>';
        else if (p.status==='served') html += '<span class="status-pill served-pill" data-i18n="servedStatus"></span>';
        else if (p.status==='skipped') html += '<span class="status-pill skipped-pill" data-i18n="skipped"></span>';
        html += '</div>';
        html += '<div class="slot-right">';
        if (!isDone && useSlots) {
            html += '<select class="slot-select" onchange="quickMove(\''+p.id+'\',this.value)">';
            for (const s of (data.slots || [])) {
                html += '<option value="'+s.index+'" '+(p.slot_group===s.index?'selected':'')+'> '+s.label+'</option>';
            }
            html += '</select>';
            html += '<div class="slot-actions">';
            html += '<button class="btn btn-primary btn-xs" onclick="serve(\''+p.id+'\')" data-i18n-title="servedTitle">&#10003;</button>';
            html += '<button class="btn btn-warning btn-xs" onclick="skip(\''+p.id+'\')" data-i18n-title="skipTitle">&#10007;</button>';
            html += '</div>';
        } else if (!isDone) {
            html += '<div class="slot-actions">';
            html += '<button class="btn btn-primary btn-xs" onclick="serve(\''+p.id+'\')" data-i18n-title="servedTitle">&#10003;</button>';
            html += '<button class="btn btn-warning btn-xs" onclick="skip(\''+p.id+'\')" data-i18n-title="skipTitle">&#10007;</button>';
            html += '</div>';
        } else {
            html += '<button class="btn btn-secondary btn-xs" onclick="undoAction(\''+p.id+'\')" data-i18n-title="undoTitle">&#8634;</button>';
        }
        html += '</div></div>';
        return html;
    }

    function filterSlot(idx) {
        activeSlotFilter = idx;
        if (cachedData) renderParticipants(cachedData);
        renderSlotOverview(cachedData);
    }

    async function addSlot() {
        if (!cachedData) return;
        const slots = cachedData.slots || [];
        const newIdx = slots.length;
        const sd = cachedData.slot_duration_minutes || 30;
        const st = cachedData.start_time || '09:00';
        const [h, m] = st.split(':').map(Number);
        const startMin = h * 60 + m + sd * newIdx;
        const eh = String(Math.floor(startMin / 60) % 24).padStart(2, '0');
        const em = String(startMin % 60).padStart(2, '0');
        const sh = String(Math.floor((h * 60 + m + sd * newIdx) / 60) % 24).padStart(2, '0');
        const sm = String((h * 60 + m + sd * newIdx) % 60).padStart(2, '0');
    }

    function toggleSelect(id) {
        if (selectedIds.has(id)) selectedIds.delete(id);
        else selectedIds.add(id);
        updateBulkBar();
        if (cachedData) renderParticipants(cachedData);
    }

    function toggleGroup(checkbox, ids) {
        for (const id of ids) {
            if (checkbox.checked) selectedIds.add(id);
            else selectedIds.delete(id);
        }
        updateBulkBar();
        if (cachedData) renderParticipants(cachedData);
    }

    function clearSelection() {
        selectedIds.clear();
        updateBulkBar();
        if (cachedData) renderParticipants(cachedData);
    }

    function updateBulkBar() {
        const bar = document.getElementById('bulkToolbar');
        const count = selectedIds.size;
        if (count > 0) {
            bar.style.display = 'flex';
            document.getElementById('bulkSelected').textContent = count + ' ' + t('selected');
            const sel = document.getElementById('bulkTargetSlot');
            sel.innerHTML = '';
            for (const s of (cachedData?.slots || [])) {
                sel.innerHTML += '<option value="'+s.index+'">'+esc(s.label)+' ('+s.count+'/'+s.max+')</option>';
            }
        } else {
            bar.style.display = 'none';
        }
    }

    async function quickMove(id, val) {
        const fd = new FormData();
        fd.append('participant_id', id);
        fd.append('slot_group', val);
        const r = await fetch(apiUrl+'/set-slot',{method:'POST', body:fd});
        if (!r.ok) { const e = await r.json(); alert(e.detail||t('error')); }
        loadQueue();
    }

    async function bulkMove() {
        if (selectedIds.size === 0) return;
        const val = document.getElementById('bulkTargetSlot').value;
        if (val === '') return;
        const fd = new FormData();
        fd.append('participant_ids', Array.from(selectedIds).join(','));
        fd.append('slot_group', parseInt(val));
        const r = await fetch(apiUrl+'/set-slot-batch', {method:'POST', body:fd});
        if (!r.ok) { const e = await r.json(); alert(e.detail||t('error')); }
        selectedIds.clear();
        loadQueue();
    }

    async function callNext() { await fetch(apiUrl+'/next',{method:'POST'}); loadQueue(); }
    async function serve(id) {
        lastAction = {type:'serve', id};
        showUndo(t('undoHint'));
        await fetch(apiUrl+'/serve/'+id,{method:'POST'});
        loadQueue();
    }
    async function skip(id) {
        lastAction = {type:'skip', id};
        showUndo(t('undoSkip'));
        await fetch(apiUrl+'/skip/'+id,{method:'POST'});
        loadQueue();
    }
    async function undoAction(id) {
        await fetch(apiUrl+'/undo/'+id,{method:'POST'});
        loadQueue();
    }
    async function undoLast() {
        if (!lastAction) return;
        await fetch(apiUrl+'/undo/'+lastAction.id,{method:'POST'});
        lastAction = null;
        document.getElementById('undoBar').style.display='none';
        loadQueue();
    }
    function showUndo(text) {
        document.getElementById('undoBar').style.display='flex';
        document.getElementById('undoText').textContent=text;
        setTimeout(()=>{ document.getElementById('undoBar').style.display='none'; }, 8000);
    }
    async function pauseQueue() { await fetch(apiUrl+'/pause',{method:'POST'}); loadQueue(); }
    async function resumeQueue() { await fetch(apiUrl+'/resume',{method:'POST'}); loadQueue(); }
    async function reopenQueue() { await fetch(apiUrl+'/reopen',{method:'POST'}); loadQueue(); }
    async function closeQueue() { if (!confirm(t('confirmClose'))) return; await fetch(apiUrl+'/close',{method:'POST'}); loadQueue(); }
    let pollInterval = null;

    async function deleteQueue() {
        if (!confirm(t('confirmDelete'))) return;
        if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
        var res = await fetch(apiUrl + '/delete', {method: 'POST'});
        if (res.ok) {
            var data = JSON.parse(localStorage.getItem('admin_' + queueId) || '{}');
            data._deleted = true;
            localStorage.setItem('admin_' + queueId, JSON.stringify(data));
            window.location.href = '/';
        } else {
            alert(t('noDeleteError'));
            pollInterval = setInterval(loadQueue, 3000);
        }
    }
    function exportExcel() { window.location.href = apiUrl + '/export'; }

    document.getElementById('settingsForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const fd = new FormData(this);
        await fetch(apiUrl+'/update-settings',{method:'POST', body:fd});
        showCopied(t('saved'));
    });

    function copyText(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => showCopied(t('copied'))).catch(() => fallbackCopy(text));
        } else {
            fallbackCopy(text);
        }
    }
    function fallbackCopy(text) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); showCopied(t('copied')); } catch(e) { showCopied(t('copyError')); }
        document.body.removeChild(ta);
    }
    function showCopied(msg) {
        const el = document.getElementById('codeHint');
        if (el) { el.textContent = msg; el.classList.add('copy-success'); setTimeout(()=>{ el.textContent=t('clickToCopy'); el.classList.remove('copy-success'); }, 2000); }
    }
    function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

    loadQueue();
    pollInterval = setInterval(loadQueue, 3000);
    </script>
</body>
</html>
