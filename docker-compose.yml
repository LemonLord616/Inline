services:
  web:
    build: .
    ports:
      - "8080:8000"
    volumes:
      - ./app:/app
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/inline.db
      - SECRET_KEY=inline-secret-key-change-in-production
      - BASE_URL=http://localhost:8000
    restart: unless-stopped
